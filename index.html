<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dashboard Padrón de Teléfonos — BML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f4f1f2;--s1:#ffffff;--s2:#faf7f8;--s3:#f0eaeb;--bd:#e0d4d6;
  --green:#1a9e6a;--amber:#d97706;--red:#dc2626;
  --txt:#1a0d0f;--muted:#8a6068;--dim:#e8dfe0;
  --f:'DM Sans',sans-serif;--fm:'DM Mono',monospace;
  --burdo:#8b1c2a;--burdo-light:#c42840;--burdo-bright:#e8304a;
  --movil:#6366f1;--fijo:#0ea5e9;--smsc:#d97706;--smsl:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--f);font-size:12px;height:100vh;display:flex;overflow:hidden}
.sidebar{width:190px;min-width:190px;background:var(--burdo);display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:14px 14px 10px;font-size:13px;font-weight:600;color:#fff;border-bottom:1px solid rgba(255,255,255,.15)}
.sb-logo small{display:block;font-size:10px;font-weight:400;opacity:.6;margin-top:2px}
.sb-section{padding:6px 14px 3px;font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.4);text-transform:uppercase}
.sb-item{padding:8px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.07);border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:rgba(255,255,255,.1)}
.sb-item.active{background:rgba(255,255,255,.18);border-left-color:#fff}
.sb-item.active .sb-name{color:#fff;font-weight:600}
.sb-name{font-size:12px;font-weight:500;color:rgba(255,255,255,.85)}
.sb-val{font-size:10px;font-family:var(--fm);color:rgba(255,255,255,.5)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--s1);border-bottom:2px solid var(--burdo);padding:12px 20px;flex-shrink:0}
.topbar-row1{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.topbar-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em}
.topbar-sub{font-size:12px;color:var(--muted)}
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px 13px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.b::before{background:linear-gradient(90deg,var(--burdo-light),var(--burdo-bright))}
.kpi.mv::before{background:var(--movil)}.kpi.fj::before{background:var(--fijo)}
.kpi.g::before{background:var(--green)}.kpi.a::before{background:var(--amber)}
.kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.kpi-v{font-size:18px;font-weight:600;font-family:var(--fm);line-height:1}
.kpi-s{font-size:10px;color:var(--muted);margin-top:3px}
.content{flex:1;overflow:auto;padding:12px 18px}
.filter-panel{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 13px;margin-bottom:10px}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:10px;color:var(--burdo);font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;min-width:68px}
.chip{padding:3px 8px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--muted);font-size:10px;cursor:pointer;transition:all .12s;font-family:var(--f)}
.chip:hover{border-color:var(--burdo-light);color:var(--burdo-light)}
.chip.on{border-color:var(--burdo-light);background:rgba(196,40,64,.1);color:var(--burdo-light);font-weight:600}
.tab-bar{display:flex;gap:5px;margin-bottom:10px}
.tab{padding:4px 13px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:var(--f);transition:all .12s;font-weight:500}
.tab.on{border-color:var(--burdo-light);background:rgba(196,40,64,.12);color:var(--burdo-light);font-weight:600}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--burdo);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--burdo);opacity:.2}
.tbl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.tbl-header .sec-label{flex:1;margin-right:10px;margin-bottom:0}
.tbl-header .sec-label::after{display:none}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--bd);margin-bottom:12px}
table.res{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
table.res thead th{padding:6px 9px;text-align:right;font-size:10px;font-weight:500;color:var(--burdo);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--bd);background:var(--s2)}
table.res thead th.tl{text-align:left;padding-left:13px}
table.res thead th.grp{border-left:2px solid var(--bd)}
table.res tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
table.res tbody tr:hover{background:var(--dim)}
table.res tbody tr.tot td{background:var(--s3);font-weight:600;border-top:2px solid var(--burdo-light)}
table.res td{padding:6px 9px;text-align:right;font-family:var(--fm)}
table.res td.tl{text-align:left;font-family:var(--f);padding-left:13px}
table.res td.grp{border-left:2px solid var(--bd)}
.tipo-mv{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(99,102,241,.12);color:var(--movil)}
.tipo-fj{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:rgba(14,165,233,.12);color:var(--fijo)}
.bbar{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.btrack{width:55px;height:5px;background:var(--dim);border-radius:3px;overflow:hidden;flex-shrink:0}
.bfill{height:100%;border-radius:3px}
.seg{display:flex;height:6px;border-radius:3px;overflow:hidden;width:70px}
.xl-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:6px;border:1px solid rgba(139,28,42,.3);background:rgba(139,28,42,.06);color:var(--burdo);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--f);transition:all .12s}
.xl-btn:hover{background:rgba(139,28,42,.12);border-color:var(--burdo)}
.prov-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
/* PROV CARDS */
.prov-cards{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-bottom:12px}
.prov-card{background:var(--s1);border:1px solid var(--bd);border-radius:7px;padding:9px 11px;position:relative;overflow:hidden}
.prov-card-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.pc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.pc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.pc-val{font-size:12px;font-weight:600;font-family:var(--fm)}
.pc-tot{border-top:1px solid var(--bd);margin-top:6px;padding-top:5px}
.pc-mini{height:4px;border-radius:2px;margin-top:5px;background:var(--dim);overflow:hidden}
.pc-mini-fill{height:100%;border-radius:2px}
/* PCT highlight */
.pct-hi{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}
.pct-hi.g{background:rgba(26,158,106,.12);color:var(--green)}
.pct-hi.a{background:rgba(217,119,6,.12);color:var(--amber)}
.pct-hi.r{background:rgba(220,38,38,.12);color:var(--red)}
table.res thead th[rowspan]{vertical-align:middle;background:var(--s2)}
table.res thead tr:first-child th{border-bottom:1px solid var(--bd)}
table.res thead tr:last-child th{border-bottom:2px solid var(--bd);padding-top:3px;padding-bottom:5px}
/* Sticky primeras columnas tabla cruzada */
.tbl-wrap{position:relative}
table.res th.stk, table.res td.stk{position:sticky;z-index:2;background:var(--s1)}
table.res tr.tot td.stk{background:var(--s3)}
table.res tbody tr:hover td.stk{background:var(--dim)}
table.res thead th.stk{background:var(--s2);z-index:3}
table.res th.stk1,table.res td.stk1{left:0;min-width:100px;max-width:100px;white-space:nowrap}
table.res th.stk2,table.res td.stk2{left:100px;min-width:60px;max-width:60px;box-shadow:2px 0 4px rgba(0,0,0,.07)}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo">BML Collection<small>Padrón de Teléfonos</small></div>
  <div class="sb-section">Entidades</div>
  <div id="sbItems"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="topbar-title">Padrón de Teléfonos</div>
      <span class="badge" id="mBadge" style="background:rgba(139,28,42,.1);color:var(--burdo)"></span>
      <span class="topbar-sub" id="mSub"></span>
      <span id="csv-update" style="margin-left:auto;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        —
      </span>
    </div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-l">Casos c/ Teléfono</div><div class="kpi-v" id="kv-casos">—</div><div class="kpi-s">casos activos</div></div>
      <div class="kpi b"><div class="kpi-l">Teléfonos Total</div><div class="kpi-v" id="kv-tel">—</div><div class="kpi-s">líneas en padrón</div></div>
      <div class="kpi mv"><div class="kpi-l">Móviles</div><div class="kpi-v" id="kv-movil" style="color:var(--movil)">—</div><div class="kpi-s" id="kv-pmovil">—</div></div>
      <div class="kpi fj"><div class="kpi-l">Fijos</div><div class="kpi-v" id="kv-fijo" style="color:var(--fijo)">—</div><div class="kpi-s" id="kv-pfijo">—</div></div>
      <div class="kpi g"><div class="kpi-l">Contactados IVR</div><div class="kpi-v" id="kv-cont" style="color:var(--green)">—</div><div class="kpi-s" id="kv-pcont">—</div></div>
      <div class="kpi a"><div class="kpi-l">SMS Totales</div><div class="kpi-v" id="kv-sms">—</div><div class="kpi-s" id="kv-smssub">—</div></div>
    </div>
  </div>
  <div class="content">
    <div class="filter-panel">
      <div class="filter-row"><span class="filter-label">Entidad</span><div id="fr-ent" style="display:flex;gap:4px;flex-wrap:wrap"></div></div>
      <div class="filter-row"><span class="filter-label">Tramo</span><div id="fr-tramo" style="display:flex;gap:4px;flex-wrap:wrap"></div></div>
      <div class="filter-row"><span class="filter-label">Proveedor</span><div id="fr-prov" style="display:flex;gap:4px;flex-wrap:wrap"></div></div>
      <div class="filter-row"><span class="filter-label">Tipo</span><div id="fr-tipo" style="display:flex;gap:4px;flex-wrap:wrap"></div></div>
    </div>
    <div class="sec-label">Resumen por Proveedor</div>
    <div class="prov-cards" id="prov-cards"></div>
    <div class="tab-bar">
      <span class="tab on" onclick="setVista('entidad')">Por Entidad</span>
      <span class="tab" onclick="setVista('proveedor')">Por Proveedor</span>
      <span class="tab" onclick="setVista('tramo')">Por Tramo</span>
      <span class="tab" onclick="setVista('detalle')">Detalle Completo</span>
    </div>
    <div id="cnt"></div>
  </div>
</div>
<script>
const TRAMO_ORDER=['1) 0 a 30 dias','2) 31 a 60 dias','3) 61 a 90 dias','4) 91 a 180 dias','5) 181 a 360 dias','6) Mayor a 360 dias'];
const TRAMO_ABBR={'1) 0 a 30 dias':'0-30d','2) 31 a 60 dias':'31-60d','3) 61 a 90 dias':'61-90d','4) 91 a 180 dias':'91-180d','5) 181 a 360 dias':'181-360d','6) Mayor a 360 dias':'>360d'};
const PROV_COLORS={claro:'#f59e0b',movistar:'#0ea5e9',personal:'#22c55e',telecom:'#3b82f6',telefonica:'#6366f1',telecentro:'#ef4444','Sin proveedor':'#94a3b8'};
const ENT_COLORS=['#c42840','#1a9e6a','#d97706','#6366f1','#0ea5e9','#f43f5e','#10b981','#f59e0b','#8b5cf6','#14b8a6','#ef4444','#22c55e','#eab308','#3b82f6'];

const fmt=n=>isNaN(n)?'—':Math.round(n).toLocaleString('es-AR');
const fmtM=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'k':String(Math.round(n));
const pct=(a,b)=>b&&b>0?((a/b)*100).toFixed(1)+'%':'—';
const pctN=(a,b)=>b&&b>0?((a/b)*100).toFixed(1):0;
const num=s=>parseFloat(s)||0;

function pctChip(a,b){
  const p=b>0?(a/b*100):0;
  const cls=p>=50?'g':p>=20?'a':'r';
  return `<span class="pct-hi ${cls}">${p.toFixed(1)}%</span>`;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    // Parser simple que maneja campos entre comillas dobles
    const v=[];
    let cur='', inQ=false;
    for(let i=0;i<l.length;i++){
      const c=l[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){v.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    v.push(cur.trim());
    const o={};
    headers.forEach((h,i)=>o[h]=v[i]?v[i].trim().replace(/^"|"$/g,''):'');
    return o;
  });
}

let allRows=[], ENTS=[], TRAMOS=[], PROVS=[];
let activeEnts=new Set(), activeTramos=new Set(), activeProvs=new Set(), activeTipos=new Set(['MOVIL','FIJO']);
let curVista='entidad';

function initWithData(data){
  allRows=data;
  ENTS=[...new Set(allRows.map(r=>r.entidad))].sort();
  TRAMOS=[...new Set(allRows.map(r=>r.tramo_gestion))].sort((a,b)=>TRAMO_ORDER.indexOf(a)-TRAMO_ORDER.indexOf(b));
  PROVS=[...new Set(allRows.map(r=>r.proveedor))].sort();
  activeEnts=new Set(ENTS); activeTramos=new Set(TRAMOS); activeProvs=new Set(PROVS);
  buildSidebar(); buildFilters(); render();
}

function filtered(){
  return allRows.filter(r=>activeEnts.has(r.entidad)&&activeTramos.has(r.tramo_gestion)&&activeProvs.has(r.proveedor)&&activeTipos.has(r.tipo));
}

function sumRows(rows){
  return rows.reduce((a,r)=>({
    casos:a.casos+num(r.casos_activos_con_telefono),
    tel:a.tel+num(r.telefonos_total),
    cont:a.cont+num(r.telefonos_contactados_ivr),
    scont:a.scont+num(r.telefonos_sin_contacto_ivr),
    sms:a.sms+num(r.sms_total),
    sms_c:a.sms_c+num(r.sms_cortos),
    sms_l:a.sms_l+num(r.sms_largos)
  }),{casos:0,tel:0,cont:0,scont:0,sms:0,sms_c:0,sms_l:0});
}

// SIDEBAR
function buildSidebar(){
  const totals={};
  allRows.forEach(r=>{if(!totals[r.entidad])totals[r.entidad]=0; totals[r.entidad]+=num(r.telefonos_total);});
  const tot=Object.values(totals).reduce((a,b)=>a+b,0);
  let html=`<div class="sb-item active" onclick="selectEnt('ALL',this)"><span class="sb-name">Todas las entidades</span><span class="sb-val">${fmtM(tot)}</span></div>`;
  ENTS.forEach((e,i)=>{
    html+=`<div class="sb-item" onclick="selectEnt('${e}',this)"><span class="sb-name"><span style="width:6px;height:6px;border-radius:50%;background:${ENT_COLORS[i%ENT_COLORS.length]};display:inline-block;margin-right:5px"></span>${e}</span><span class="sb-val">${fmtM(totals[e]||0)}</span></div>`;
  });
  document.getElementById('sbItems').innerHTML=html;
}

function selectEnt(ent,el){
  document.querySelectorAll('.sb-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  activeEnts=ent==='ALL'?new Set(ENTS):new Set([ent]);
  buildFilters(); render();
}

// FILTROS
function buildFilters(){
  buildChips('fr-ent',ENTS,activeEnts,'ent');
  buildChips('fr-tramo',TRAMOS,activeTramos,'tramo',TRAMO_ABBR);
  buildChips('fr-prov',PROVS,activeProvs,'prov');
  buildChips('fr-tipo',['MOVIL','FIJO'],activeTipos,'tipo');
}
function buildChips(id,items,activeSet,type,abbr){
  const allOn=items.every(x=>activeSet.has(x));
  let html=`<span class="chip${allOn?' on':''}" onclick="toggleAll('${type}')">${allOn?'✓ ':''} Todos</span>`;
  items.forEach(item=>{
    const on=activeSet.has(item);
    const label=abbr?abbr[item]||item:item;
    let dot=type==='prov'&&PROV_COLORS[item]?`<span style="width:7px;height:7px;border-radius:50%;background:${PROV_COLORS[item]};display:inline-block;margin-right:3px"></span>`:'';
    html+=`<span class="chip${on?' on':''}" onclick="toggleChip('${type}','${item}')">${dot}${label}</span>`;
  });
  document.getElementById(id).innerHTML=html;
}
function toggleAll(type){
  const map={ent:[activeEnts,ENTS],tramo:[activeTramos,TRAMOS],prov:[activeProvs,PROVS],tipo:[activeTipos,['MOVIL','FIJO']]};
  const [set,items]=map[type];
  if(items.every(x=>set.has(x))) set.clear(); else items.forEach(x=>set.add(x));
  buildFilters(); render();
}
function toggleChip(type,val){
  const map={ent:activeEnts,tramo:activeTramos,prov:activeProvs,tipo:activeTipos};
  const set=map[type];
  if(set.has(val)) set.delete(val); else set.add(val);
  buildFilters(); render();
}
function setVista(v){
  curVista=v;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('on',['entidad','proveedor','tramo','detalle'][i]===v);
  });
  render();
}

// KPIs
function updateKPIs(rows){
  const s=sumRows(rows);
  const sm=sumRows(rows.filter(r=>r.tipo==='MOVIL'));
  const sf=sumRows(rows.filter(r=>r.tipo==='FIJO'));
  document.getElementById('kv-casos').textContent=fmt(s.casos);
  document.getElementById('kv-tel').textContent=fmt(s.tel);
  document.getElementById('kv-movil').textContent=fmt(sm.tel);
  document.getElementById('kv-pmovil').textContent=s.tel?pct(sm.tel,s.tel)+' del total':'—';
  document.getElementById('kv-fijo').textContent=fmt(sf.tel);
  document.getElementById('kv-pfijo').textContent=s.tel?pct(sf.tel,s.tel)+' del total':'—';
  document.getElementById('kv-cont').textContent=fmt(s.cont);
  document.getElementById('kv-pcont').textContent=s.tel?pct(s.cont,s.tel)+' de contacto':'—';
  document.getElementById('kv-sms').textContent=fmt(s.sms);
  document.getElementById('kv-smssub').textContent=`C: ${fmt(s.sms_c)} | L: ${fmt(s.sms_l)}`;
  const ents=[...activeEnts];
  document.getElementById('mBadge').textContent=ents.length===ENTS.length?'TODAS LAS ENTIDADES':ents.join(' · ');
  document.getElementById('mSub').textContent=`${fmt(s.tel)} líneas · ${[...activeTramos].length} tramo(s) · ${[...activeProvs].length} proveedor(es)`;
}

// TARJETAS PROVEEDOR
function buildProvCards(rows){
  const totTel=rows.reduce((a,r)=>a+num(r.telefonos_total),0);
  const byProv={};
  rows.forEach(r=>{
    if(!byProv[r.proveedor]) byProv[r.proveedor]={movil:0,fijo:0,cont:0,scont:0};
    if(r.tipo==='MOVIL') byProv[r.proveedor].movil+=num(r.telefonos_total); else byProv[r.proveedor].fijo+=num(r.telefonos_total);
    byProv[r.proveedor].cont+=num(r.telefonos_contactados_ivr);
    byProv[r.proveedor].scont+=num(r.telefonos_sin_contacto_ivr);
  });
  let html='';
  PROVS.filter(p=>byProv[p]).forEach(p=>{
    const d=byProv[p]; const tot=d.movil+d.fijo; const color=PROV_COLORS[p]||'#94a3b8';
    const pctTot=totTel?((tot/totTel)*100).toFixed(1):0;
    const pctCont=tot>0?((d.cont/tot)*100).toFixed(1):0;
    html+=`<div class="prov-card">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${color}"></div>
      <div class="prov-card-name"><span class="prov-dot" style="background:${color}"></span>${p==='Sin proveedor'?'Sin prov.':p}</div>

}

// RENDER
function render(){
  const rows=filtered();
  updateKPIs(rows);
  buildProvCards(rows);
  if(curVista==='entidad') renderEntidad(rows);
  else if(curVista==='proveedor') renderProveedor(rows);
  else if(curVista==='tramo') renderTramo(rows);
  else renderDetalle(rows);
}

// ── VISTA: POR PROVEEDOR ──────────────────────────────────────────────────────
function renderProveedor(rows){
  // ── Agregado por proveedor (resumen general) ──
  const byProv={};
  rows.forEach(r=>{
    if(!byProv[r.proveedor]) byProv[r.proveedor]={movil:0,fijo:0,casos:0,cont:0,sms_c:0,sms_l:0};
    const d=byProv[r.proveedor];
    if(r.tipo==='MOVIL') d.movil+=num(r.telefonos_total); else d.fijo+=num(r.telefonos_total);
    d.casos+=num(r.casos_activos_con_telefono);
    d.cont+=num(r.telefonos_contactados_ivr);
    d.sms_c+=num(r.sms_cortos); d.sms_l+=num(r.sms_largos);
  });

  // ── Cruce proveedor × entidad (móviles, fijos, total) ──
  const byPE={};  // byPE[proveedor][entidad]
  rows.forEach(r=>{
    if(!byPE[r.proveedor]) byPE[r.proveedor]={};
    if(!byPE[r.proveedor][r.entidad]) byPE[r.proveedor][r.entidad]={movil:0,fijo:0};
    if(r.tipo==='MOVIL') byPE[r.proveedor][r.entidad].movil+=num(r.telefonos_total);
    else byPE[r.proveedor][r.entidad].fijo+=num(r.telefonos_total);
  });

  const provs=PROVS.filter(p=>byProv[p]).sort((a,b)=>(byProv[b].movil+byProv[b].fijo)-(byProv[a].movil+byProv[a].fijo));
  const ents=[...activeEnts].sort();
  const totTel=provs.reduce((a,p)=>a+byProv[p].movil+byProv[p].fijo,0);
  const tm=provs.reduce((a,p)=>a+byProv[p].movil,0), tf=provs.reduce((a,p)=>a+byProv[p].fijo,0);
  const tc=provs.reduce((a,p)=>a+byProv[p].cont,0);
  const tsc=provs.reduce((a,p)=>a+byProv[p].sms_c,0), tsl=provs.reduce((a,p)=>a+byProv[p].sms_l,0);

  // ── TABLA 1: Resumen por proveedor ──
  let html=`<div class="tbl-header"><div class="sec-label">Resumen por Proveedor</div><button class="xl-btn" onclick="exportXLSX()">⬇ Excel</button></div>
  <div class="tbl-wrap"><table class="res"><thead><tr>
    <th class="tl">Proveedor</th>
    <th>Casos</th><th>Total</th>
    <th class="grp">Móviles</th><th>Fijos</th>
    <th class="grp">IVR Cont.</th><th>% IVR</th>
    <th class="grp">SMS C</th><th>% SMS C/Móv</th><th>SMS L</th><th>% SMS L/Móv</th>
    <th>% Padrón</th><th>% Móvil</th><th>% Fijo</th>
  </tr></thead><tbody>`;

  provs.forEach(p=>{
    const d=byProv[p]; const tel=d.movil+d.fijo; const color=PROV_COLORS[p]||'#94a3b8';
    html+=`<tr>
      <td class="tl"><span class="prov-dot" style="background:${color}"></span><b>${p}</b></td>
      <td>${fmt(d.casos)}</td>
      <td><b>${fmt(tel)}</b></td>
      <td class="grp" style="color:var(--movil)">${d.movil?fmt(d.movil):'—'}</td>
      <td style="color:var(--fijo)">${d.fijo?fmt(d.fijo):'—'}</td>
      <td class="grp" style="color:var(--green)">${fmt(d.cont)}</td>
      <td>${pctChip(d.cont,tel)}</td>
      <td class="grp" style="color:var(--smsc)">${fmt(d.sms_c)}</td>
      <td>${d.movil>0?pctChip(d.sms_c,d.movil):'<span style="color:var(--muted)">—</span>'}</td>
      <td style="color:var(--smsl)">${fmt(d.sms_l)}</td>
      <td>${d.movil>0?pctChip(d.sms_l,d.movil):'<span style="color:var(--muted)">—</span>'}</td>

    <td>${fmt(totTel)}</td>

  // Totales por entidad (para fila de pie)
  const totByEnt={};
  ents.forEach(e=>{ totByEnt[e]={movil:0,fijo:0}; });
  rows.forEach(r=>{
    if(!totByEnt[r.entidad]) return;
    if(r.tipo==='MOVIL') totByEnt[r.entidad].movil+=num(r.telefonos_total);
    else totByEnt[r.entidad].fijo+=num(r.telefonos_total);

    </tr>
  </thead><tbody>`;

  provs.forEach(p=>{
    const d=byProv[p]; const tel=d.movil+d.fijo; const color=PROV_COLORS[p]||'#94a3b8';
    const entCells=ents.map(e=>{
      const ep=(byPE[p]&&byPE[p][e])||{movil:0,fijo:0};
      const entTotMovil=totByEnt[e]?totByEnt[e].movil:0;
      const entTotFijo=totByEnt[e]?totByEnt[e].fijo:0;
      const mv=ep.movil?`<span style="color:var(--movil)">${fmt(ep.movil)}</span><div style="font-size:9px;color:var(--muted)">${entTotMovil>0?pct(ep.movil,entTotMovil):'—'}</div>`:'<span style="color:var(--muted);font-size:10px">—</span>';
      const fj=ep.fijo?`<span style="color:var(--fijo)">${fmt(ep.fijo)}</span><div style="font-size:9px;color:var(--muted)">${entTotFijo>0?pct(ep.fijo,entTotFijo):'—'}</div>`:'<span style="color:var(--muted);font-size:10px">—</span>';
      return `<td class="grp">${mv}</td><td>${fj}</td>`;
    }).join('');
    html+=`<tr>
      <td class="tl stk stk1"><span class="prov-dot" style="background:${color}"></span><b>${p}</b></td>

    </tr>`;
  });

  // Fila TOTAL por entidad
  html+=`<tr class="tot">
    <td class="tl stk stk1">TOTAL</td>
    <td class="stk stk2">${fmt(totTel)}</td>
    ${ents.map(e=>{
      const d=totByEnt[e]||{movil:0,fijo:0};
      return `<td class="grp" style="color:var(--movil)">${fmt(d.movil)}</td><td style="color:var(--fijo)">${fmt(d.fijo)}</td>`;
    }).join('')}
  </tr>`;

  html+=`</tbody></table></div>`;
  document.getElementById('cnt').innerHTML=html;
}

      <td>${r.tipo==='MOVIL'?pctChip(sc,tel):'<span style="color:var(--muted);font-size:10px">—</span>'}</td>
      <td style="color:var(--smsl)">${fmt(sl)}</td>
      <td>${r.tipo==='MOVIL'?pctChip(sl,tel):'<span style="color:var(--muted);font-size:10px">—</span>'}</td>
      <td>${fmt(r.sms_total)}</td>
      <td><div class="bbar"><span>${(totTel?((tel/totTel)*100):0).toFixed(1)}%</span><div class="btrack"><div class="bfill" style="width:${totTel?tel/totTel*100:0}%;background:${color}"></div></div></div></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('cnt').innerHTML=html;
}

// EXPORT
function exportXLSX(){
  const rows=filtered();
  const data=[['Entidad','Tramo','Proveedor','Tipo','Casos','Tel Total','IVR Contactados','% IVR','Sin Contacto','SMS Cortos','% SMS C','SMS Largos','% SMS L','SMS Total']];
  rows.forEach(r=>{
    const tel=num(r.telefonos_total), cont=num(r.telefonos_contactados_ivr);
    const sc=num(r.sms_cortos), sl=num(r.sms_largos);
    data.push([r.entidad,r.tramo_gestion,r.proveedor,r.tipo,num(r.casos_activos_con_telefono),tel,cont,tel?+(cont/tel*100).toFixed(1):0,num(r.telefonos_sin_contacto_ivr),sc,tel?+(sc/tel*100).toFixed(1):0,sl,tel?+(sl/tel*100).toFixed(1):0,num(r.sms_total)]);
  });
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Padrón Teléfonos');
  XLSX.writeFile(wb,'padron_telefonos.xlsx');
}
// ── INICIO: cargar CSV + fecha último commit ──────────────────────────────────
const GH_USER = 'francysvirginia16';
const GH_REPO = 'padron_telefono';
const GH_FILE = 'telefonos.csv';

document.getElementById('cnt').innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">⏳ Cargando datos...</div>';

function fmtFechaArg(isoStr){
  const d=new Date(isoStr);
  const dd=String(d.getDate()).padStart(2,'0');
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const yyyy=d.getFullYear();
  const hh=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yyyy} ${hh}:${mi}`;
}

// Buscar fecha del último commit del CSV via GitHub API
fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/commits?path=${GH_FILE}&per_page=1`)
  .then(r=>r.ok?r.json():null)
  .then(commits=>{
    if(commits&&commits.length>0){
      const isoDate=commits[0].commit.committer.date;
      document.getElementById('csv-update').textContent='Actualización: ' + fmtFechaArg(isoDate);
    }
  })
  .catch(()=>{}); // silencioso si falla

// Cargar el CSV
fetch(GH_FILE)
  .then(r=>{
    if(!r.ok) throw new Error('HTTP ' + r.status + ' — no se pudo cargar ' + GH_FILE);
    return r.text();
  })
  .then(text=>{ initWithData(parseCSV(text)); })
  .catch(err=>{
    document.getElementById('cnt').innerHTML=`<div style="padding:40px;text-align:center">
      <div style="color:var(--red);font-size:14px;font-weight:600;margin-bottom:8px">⚠ Error al cargar el CSV</div>
      <div style="color:var(--muted);font-size:12px">${err.message}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:10px">Verificá que <b>telefonos.csv</b> esté en el mismo directorio que el HTML en el repositorio de GitHub.</div>
    </div>`;
  });
</script>
